<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watch — BodyFuel TV</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
  <style>
    .watch-page { min-height: 100vh; background: #111; padding-top: 72px; }
    .watch-container { max-width: 1200px; margin: 0 auto; padding: 24px; }

    .watch-player { position: relative; width: 100%; padding-top: 56.25%; background: #000; border-radius: 12px; overflow: hidden; margin-bottom: 24px; }
    .watch-player iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

    .watch-info { background: #1a1a2e; border-radius: 12px; padding: 24px; margin-bottom: 24px; }
    .watch-info h1 { font-size: 1.5rem; color: white; margin-bottom: 8px; }
    .watch-meta { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
    .watch-meta-item { font-size: 0.85rem; color: #9ca3af; }
    .watch-meta-item strong { color: #e5e7eb; }
    .watch-description { color: #9ca3af; line-height: 1.6; font-size: 0.95rem; margin-bottom: 16px; }
    .watch-details { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .watch-detail { background: rgba(255,255,255,0.05); border-radius: 8px; padding: 12px; text-align: center; }
    .watch-detail-label { font-size: 0.75rem; color: #6b7280; text-transform: uppercase; letter-spacing: 0.5px; }
    .watch-detail-value { font-size: 0.95rem; color: white; font-weight: 600; margin-top: 4px; }

    .watch-related { margin-top: 24px; }
    .watch-related h2 { font-family: 'Montserrat', sans-serif; font-size: 1.3rem; color: white; margin-bottom: 16px; }
    .related-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }

    .back-link { display: inline-flex; align-items: center; gap: 8px; color: #9ca3af; text-decoration: none; font-size: 0.9rem; margin-bottom: 16px; transition: color 0.2s; }
    .back-link:hover { color: white; }

    .watch-loading { text-align: center; padding: 100px 0; color: #9ca3af; }
    .watch-loading .spinner { width: 40px; height: 40px; border: 3px solid #333; border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .watch-error { text-align: center; padding: 100px 0; color: #9ca3af; }
    .watch-error h2 { color: var(--primary); }

    @media (max-width: 640px) {
      .watch-details { grid-template-columns: 1fr 1fr; }
      .related-grid { grid-template-columns: 1fr; }
    }

    /* Video card styles for related grid */
    .video-card { background: #1a1a2e; border-radius: 12px; overflow: hidden; cursor: pointer; transition: all 0.3s; }
    .video-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
    .video-thumb { position: relative; width: 100%; padding-top: 56.25%; background: #222; overflow: hidden; }
    .video-thumb img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
    .video-duration { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.75); color: white; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: 600; }
    .video-info { padding: 12px; }
    .video-info h3 { color: white; }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="container nav-container">
      <a href="/dashboard.html" class="logo"><img src="/brand/logo_option1.png" alt="" class="logo-img" /><span class="logo-text">BodyFuel TV</span></a>
      <ul class="nav-links">
        <li><a href="/dashboard.html">Dashboard</a></li>
        <li><a href="#" id="nav-logout" style="color:#6b7280;">Log Out</a></li>
      </ul>
    </div>
  </nav>

  <div class="watch-page">
    <div class="watch-container">
      <div id="watch-loading" class="watch-loading"><div class="spinner"></div><p>Loading video...</p></div>
      <div id="watch-error" class="watch-error" style="display:none;">
        <h2>Video Not Found</h2>
        <p>This video could not be loaded.</p>
        <a href="/dashboard.html" class="back-link" style="display:inline-flex;margin-top:16px;">← Back to Dashboard</a>
      </div>

      <div id="watch-content" style="display:none;">
        <a href="/dashboard.html" class="back-link">← Back to Dashboard</a>

        <div class="watch-player">
          <iframe id="video-iframe" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>

        <div class="watch-info">
          <h1 id="video-title"></h1>
          <div class="watch-meta">
            <span class="watch-meta-item"><strong id="video-instructor"></strong></span>
            <span class="watch-meta-item" id="video-level"></span>
            <span class="watch-meta-item" id="video-duration"></span>
          </div>
          <p class="watch-description" id="video-description"></p>
          <div class="watch-details">
            <div class="watch-detail"><div class="watch-detail-label">Calories</div><div class="watch-detail-value" id="video-calories">—</div></div>
            <div class="watch-detail"><div class="watch-detail-label">Equipment</div><div class="watch-detail-value" id="video-equipment">—</div></div>
            <div class="watch-detail"><div class="watch-detail-label">Level</div><div class="watch-detail-value" id="video-level-detail">—</div></div>
          </div>
        </div>

        <div class="watch-related">
          <h2>More in this category</h2>
          <div class="related-grid" id="related-grid"></div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/watch.js"></script>
</body>
</html>
