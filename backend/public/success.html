<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Successful — BodyFuel TV</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Open Sans', sans-serif;
      background: #F5F5F5;
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 60px 40px;
      max-width: 500px;
      width: 100%;
      text-align: center;
      box-shadow: 0 12px 48px rgba(0,0,0,0.1);
    }
    .checkmark {
      width: 80px;
      height: 80px;
      background: #8BC34A;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 40px;
      color: #fff;
    }
    h1 { font-family: 'Montserrat', sans-serif; font-size: 2rem; margin-bottom: 12px; }
    p { color: #6b7280; line-height: 1.7; margin-bottom: 8px; }
    .btn {
      display: inline-block;
      margin-top: 28px;
      padding: 14px 36px;
      background: #FF5722;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      font-family: inherit;
      transition: background 0.3s;
    }
    .btn:hover { background: #e64a19; }
  </style>
</head>
<body>
  <div class="card">
    <div class="checkmark">✓</div>
    <h1>Welcome to BodyFuel TV!</h1>
    <p>Your subscription has been activated. You now have full access to our entire library of workouts and nutrition content.</p>
    <p>Check your email for your receipt and getting-started guide.</p>
    <a href="/" class="btn">Start Your First Workout</a>
  </div>
</body>
</html>
